version: '3.8'

services:
  app:
    build: .
    container_name: desenrolaai-site
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
